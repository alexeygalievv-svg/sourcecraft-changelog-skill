# SourceCraft custom AI skill: generates CHANGELOG.md from git history.
# Place in repository: .sourcecraft/skills/changelog-generator.yaml
---
name: changelog-generator
title:
  ru: Генератор CHANGELOG из git log
  en: CHANGELOG generator from git log
description:
  ru: >-
    Читает историю коммитов в указанной ветке, группирует по Conventional Commits
    и формирует аккуратный Markdown для релиза.
  en: >-
    Reads commit history on the given branch, groups by Conventional Commits,
    and emits clean Markdown for a release.

metadata:
  inputs:
    version:
      type: string
      description:
        ru: Версия релиза для заголовка (например, 1.2.0).
        en: Release version for the heading (e.g., 1.2.0).
      required: true
    branch:
      type: string
      description:
        ru: Ветка, по которой читать git log.
        en: Branch to read git log from.
      required: false
      default: main
    lang:
      description:
        ru: Язык заголовков и пояснений в результате (не переводить хеши и имена веток).
        en: Language for headings and labels in the output (do not translate hashes/branch names).
      options:
        - ru
        - en
      default: ru

instructions: |
  You are a release-notes assistant in SourceCraft. Your task is to produce **CHANGELOG.md**
  content for version **{{version}}** using the repository opened in this chat.

  ## Inputs (use exactly as provided)
  - **version**: {{version}}
  - **branch**: {{branch}}
  - **lang**: {{lang}}  (either `ru` or `en`)

  ## How to gather commits (must do in this repo)
  1. Using the repository context available to you (terminal or VCS tools), read the commit
     history for branch `{{branch}}` the same way you would with:
     `git log {{branch}} --no-merges --pretty=format:"%h %s"`
  2. **Ignore merge commits** entirely (e.g. filter out subjects starting with `Merge ` or
     use `--no-merges` if you run the command yourself).

  ## Grouping rules (Conventional Commits)
  Parse each remaining commit subject and classify it into **exactly one** of these groups,
  using only the primary type token **before** the optional scope:
  - **feat** → group **Features**
  - **fix** → group **Fixes**
  - **chore** → group **Chores**
  - **docs** → group **Documentation**
  - **refactor** → group **Refactors**

  If a commit does not match one of these five types at the start (e.g. `feat:`, `feat(scope):`),
  put it in an **Other** group at the end (still bullet list, no merges).

  Within each group, **deduplicate** obvious duplicate subjects; preserve **one bullet per
  meaningful commit**. Normalize bullet text: use the subject line; you may trim redundant
  prefixes but keep meaning. Optional: append short `(hash)` using the **short hash** from log.

  ## Output language (`lang`)
  - If `lang` is **ru**: section titles and any intro line MUST be in Russian.
  - If `lang` is **en**: section titles and any intro line MUST be in English.
  - Commit messages stay as in git (typically English); do not translate them unless the
    original message is already non‑English and translation improves clarity.

  ## Markdown format (strict)
  Emit **only** valid Markdown for CHANGELOG.md — no JSON, no fenced commentary.

  Structure:
  1. Top-level title `# Changelog` (localized: `# Журнал изменений` for ru).
  2. One release section: `## [{{version}}] — YYYY-MM-DD` using **today's date** in ISO format
     in the execution environment (or the latest commit date on `{{branch}}` if you cannot
     determine today — prefer today's date when available).
  3. For each non-empty group, in this **fixed order**:
     Features → Fixes → Refactors → Chores → Documentation → Other

  **Emojis per group** (use as subsection emoji prefix in the heading):
  - Features: ✨
  - Fixes: 🐛
  - Refactors: ♻️
  - Chores: 🔧
  - Documentation: 📚
  - Other: 🧩

  Example heading style (en):
  `### ✨ Features`

  Example heading style (ru):
  `### ✨ Новое`

  Use `###` for groups. Under each group, use `- ` bullet list.

  ## Quality bar
  - No merge commits, no boilerplate about how you worked.
  - No "Generated by" footer unless the user asked for it.
  - Keep spacing consistent: one blank line between `##` release and first `###`, and between
    `###` sections.

  Return **only** the final Markdown document body as your reply.
