name: changelog-generator
description: Генерирует CHANGELOG.md из истории коммитов репозитория через API SourceCraft
inputs:
  version:
    description: Версия релиза (например 1.2.0)
    required: true
  branch:
    description: Ветка для анализа коммитов
    default: main
  lang:
    description: Язык заголовков ru или en
    default: ru
  since:
    description: Дата начала периода (формат YYYY-MM-DD)
    default: ""
  until:
    description: Дата окончания периода (формат YYYY-MM-DD)
    default: ""
  author:
    description: Фильтр по автору коммитов
    default: ""
  output:
    description: Формат вывода (markdown, json, plain)
    default: markdown

instructions: |
  # Генератор CHANGELOG для SourceCraft
  
  ## Цель
  Сгенерировать CHANGELOG.md для версии {{version}} на основе истории коммитов репозитория.
  
  ## Шаги выполнения
  
  1. **Получить историю коммитов через API SourceCraft**
     - Используй инструменты платформы для получения списка коммитов
     - Фильтруй коммиты по ветке: {{branch}}
     {% if since %} - Период с: {{since}}{% endif %}
     {% if until %} - Период по: {{until}}{% endif %}
     {% if author %} - Автор: {{author}}{% endif %}
     - Исключи merge-коммиты (коммиты слияния)
  
  2. **Анализ и группировка коммитов**
     - Проанализируй каждый коммит и определи его тип по Conventional Commits:
       - `feat:` → ✨ Новое (новые функции)
       - `fix:` → 🐛 Исправления (исправления ошибок)
       - `chore:` → 🔧 Служебное (обслуживание, зависимости)
       - `docs:` → 📚 Документация
       - `refactor:` → ♻️ Рефакторинг
       - `style:` → 💎 Стиль (форматирование, пробелы)
       - `test:` → ✅ Тесты
       - `perf:` → 🚀 Производительность
       - `ci:` → 🔄 CI/CD
       - `build:` → 📦 Сборка
     
     - Для каждого коммита извлеки:
       - Хэш коммита (первые 7 символов)
       - Сообщение коммита
       - Автора
       - Дату
  
  3. **Создание структуры CHANGELOG**
     - Создай заголовок: `## [{{version}}] — {{текущая_дата}}`
     - Сгруппируй коммиты по типам
     - Для каждого типа создай подраздел с соответствующим эмодзи
     - Внутри каждого подраздела перечисли коммиты в формате:
       - `- тип(область): сообщение (хэш)`
     
     {% if lang == "ru" %}
     - Используй русские заголовки:
       - ✨ Новое
       - 🐛 Исправления
       - 🔧 Служебное
       - 📚 Документация
       - ♻️ Рефакторинг
       - 💎 Стиль
       - ✅ Тесты
       - 🚀 Производительность
       - 🔄 CI/CD
       - 📦 Сборка
     {% else %}
     - Use English headers:
       - ✨ Features
       - 🐛 Fixes
       - 🔧 Chores
       - 📚 Documentation
       - ♻️ Refactoring
       - 💎 Style
       - ✅ Tests
       - 🚀 Performance
       - 🔄 CI/CD
       - 📦 Build
     {% endif %}
  
  4. **Обработка особых случаев**
     - Если коммит не соответствует Conventional Commits, помести его в раздел "Другие изменения"
     - Если есть breaking changes (содержат `BREAKING CHANGE:` или `!` после типа), выдели отдельный раздел "💥 Критические изменения"
     - Сохрани предыдущие версии CHANGELOG если файл уже существует
  
  5. **Создание файла**
     - Создай или обнови файл CHANGELOG.md
     - Добавь новую версию в начало файла
     - Сохрани предыдущие версии ниже
  
  6. **Валидация**
     - Проверь, что все коммиты корректно сгруппированы
     - Убедись, что хэши коммитов присутствуют
     - Проверь форматирование Markdown
  
  ## Интеграция с API SourceCraft
  
  Для получения истории коммитов используй доступные инструменты платформы:
  - `list_repo_entries` для навигации по репозиторию
  - `read_file` для чтения существующего CHANGELOG.md
  - `modify_file` для обновления CHANGELOG.md
  - Другие инструменты для работы с историей коммитов
  
  ## Пример вывода
  
  ```markdown
  # Журнал изменений
  
  ## [{{version}}] — 2025-04-01
  
  ### ✨ Новое
  
  - feat(api): добавлена поддержка WebSocket (a1b2c3d)
  - feat(ui): переработан интерфейс администратора (e4f5g6h)
  
  ### 🐛 Исправления
  
  - fix(security): устранена уязвимость XSS (q4r5s6t)
  - fix(performance): оптимизированы запросы к БД (u7v8w9x)
  
  ### 🔧 Служебное
  
  - chore(deps): обновлены все зависимости (g7h8i9j)
  - chore(ci): добавлены тесты производительности (k1l2m3n)
  
  ## [1.2.0] — 2025-03-20
  ...
  ```
  
  ## Примечания
  
  - Все даты в формате ГГГГ-ММ-ДД
  - Хэши коммитов сокращаются до 7 символов
  - Сообщения коммитов сохраняются в оригинальном виде
  - При отсутствии коммитов определенного типа соответствующий раздел не создается