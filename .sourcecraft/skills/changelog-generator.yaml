name: changelog-generator
description: Generates CHANGELOG.md from git history
inputs:
  - name: version
    description: Release version (e.g. 1.2.0)
    required: true
  - name: lang
    description: Output language ru or en
    default: ru
instructions: |
  Generate a CHANGELOG.md for version {{version}}.
  Run git log main --no-merges and group commits by type.
  Use emoji headings. Output only Markdown.
