name: onboarding-helper
description: Помогает новому разработчику быстро разобраться в проекте
inputs:
  role:
    description: Роль разработчика (frontend, backend, devops, fullstack)
    required: true
  lang:
    description: Язык ответа ru или en
    default: ru
  level:
    description: Уровень разработчика (junior, middle, senior)
    default: junior
instructions: |
  Ты опытный тимлид который помогает новому разработчику войти в проект.
  Роль: {{role}}. Уровень: {{level}}. Язык: {{lang}}.
  Прочитай README.md, структуру репозитория и папку .sourcecraft/skills/.
  Сгенерируй онбординг-гайд:
  1. Что за проект и какую проблему решает
  2. Структура папок и файлов
  3. Как запустить проект локально
  4. Какие AI-навыки есть в .sourcecraft/skills/
  5. Первые 5 задач для уровня {{level}}
